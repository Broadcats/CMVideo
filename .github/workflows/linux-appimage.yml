name: Linux AppImage

# Builds the Linux x86_64 AppImage and attaches it to a release.
#
# Triggers mirror windows-exe.yml: push of a desktop release tag
# OR workflow_dispatch against an existing tag (back-fill mode).
#
# Tag conventions:
#   * `desktop-v0.X.Y[.Z]-alpha` - new format (since v0.4.16.5).
#   * `v0.X.Y[.Z]-alpha`         - legacy format (kept for the
#                                  existing release stream + any
#                                  back-fills against pre-split
#                                  releases).
#   * `mini-YYYY.MM.DD.N-alpha`  - mini deploys. NEVER trigger
#                                  this workflow. The two
#                                  patterns above are explicitly
#                                  filtered to exclude `mini-*`.

on:
  push:
    tags:
      - "desktop-v*"
      - "v[0-9]*"      # legacy: v0.X.Y-alpha. Excludes "v" prefix
                       # used by no other tag scheme in this repo.
                       # Specifically does NOT match "mini-*".
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build against and upload to (desktop-v... or v...)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build + attach AppImage
    runs-on: ubuntu-22.04   # older glibc -> wider download compatibility

    steps:
      - name: Resolve target tag + checkout ref
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "checkout=main" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "checkout=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.checkout }}

      - name: Verify in-tree version matches target tag
        shell: bash
        run: |
          IN_TREE="$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' censor/version.py)"
          TARGET="${{ steps.tag.outputs.value }}"
          # Strip whichever desktop prefix the tag carries.
          TARGET_STRIPPED="${TARGET#desktop-v}"
          TARGET_STRIPPED="${TARGET_STRIPPED#v}"
          if [ "$IN_TREE" != "$TARGET_STRIPPED" ]; then
            echo "::error::version mismatch — in-tree '$IN_TREE' vs target '$TARGET_STRIPPED'."
            exit 1
          fi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg espeak-ng wget fuse libfuse2 python3-tk python3-venv \
            xz-utils file desktop-file-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build AppImage
        env:
          # Some sandboxed CI environments lack FUSE; force AppImage
          # bootstrappers (linuxdeploy, appimagetool) to extract first.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x scripts/build-appimage.sh
          ./scripts/build-appimage.sh

      - name: Attach AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            dist/CMVideo-*-x86_64.AppImage
            dist/CMVideo-*-x86_64.AppImage.sha256
