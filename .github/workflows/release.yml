name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  source:
    name: Build + publish source release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source archives
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Read version from tag
        id: ver
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: CMVideo ${{ steps.ver.outputs.tag }}
          body_path: CHANGELOG.md
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            dist/CMVideo-*-source.zip
            dist/CMVideo-*-source.tar.gz
            dist/SHA256SUMS.txt

  windows-exe:
    name: Build Windows standalone .exe
    needs: source
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build single-file executable
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Attach Windows binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/CMVideo-*-win-amd64.exe
            dist/CMVideo-*-win-amd64.exe.sha256
