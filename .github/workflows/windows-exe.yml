name: Windows exe

# Builds the single-file Windows executable and attaches it to a release.
#
# Triggers:
#   * push of a v*.*.* tag (covers fresh releases)
#   * manual workflow_dispatch with an existing tag (used to back-fill a
#     Windows .exe onto a release that was cut before this workflow
#     existed, e.g. v0.4.0-alpha)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build against and upload to (e.g. v0.4.0-alpha)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build + attach .exe
    runs-on: windows-latest

    steps:
      - name: Resolve target tag + checkout ref
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Back-fill mode: build from main (has the build script) and
            # upload to the named tag. We verify the version matches below.
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "checkout=main" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "checkout=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.checkout }}

      - name: Verify in-tree version matches target tag
        shell: bash
        run: |
          IN_TREE="$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' censor/version.py)"
          TARGET="${{ steps.tag.outputs.value }}"
          TARGET_STRIPPED="${TARGET#v}"
          echo "in-tree version: $IN_TREE"
          echo "target tag:      $TARGET ($TARGET_STRIPPED)"
          if [ "$IN_TREE" != "$TARGET_STRIPPED" ]; then
            echo "::error::version mismatch — in-tree '$IN_TREE' vs target '$TARGET_STRIPPED'."
            echo "::error::Bump censor/version.py to match, or dispatch against the right tag."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build single-file executable
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Attach Windows binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            dist/CMVideo-*-win-amd64.exe
            dist/CMVideo-*-win-amd64.exe.sha256
