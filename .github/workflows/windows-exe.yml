name: Windows exe

# Builds the single-file Windows executable and attaches it to a release.
#
# Triggers:
#   * push of a v*.*.* tag (covers fresh releases)
#   * manual workflow_dispatch with an existing tag (used to back-fill a
#     Windows .exe onto a release that was cut before this workflow
#     existed, e.g. v0.4.0-alpha)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build against and upload to (e.g. v0.4.0-alpha)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build + attach .exe
    runs-on: windows-latest

    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build single-file executable
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Attach Windows binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            dist/CMVideo-*-win-amd64.exe
            dist/CMVideo-*-win-amd64.exe.sha256
