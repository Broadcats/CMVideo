<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1018"/>
      <stop offset="1" stop-color="#181a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset=".5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx=".15" cy=".1" r=".7">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".25"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx=".9" cy=".15" r=".6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#eef0f7">
    <text x="80" y="240" font-size="40" fill="#a78bfa" font-weight="500" letter-spacing="6">CMVIDEO  v0.4.0-alpha</text>
    <text x="80" y="350" font-size="120" font-weight="800" letter-spacing="-2">Clean My</text>
    <text x="80" y="478" font-size="120" font-weight="800" letter-spacing="-2" fill="url(#accent)">Video.</text>
    <text x="80" y="558" font-size="28" fill="#9aa0b4">Drag in any clip. Drop out a clean copy.</text>
  </g>

  <g transform="translate(900 300)">
    <rect x="-180" y="-160" width="360" height="320" rx="22" fill="#171a26" stroke="#3b3a8a" stroke-width="2"/>
    <rect x="-180" y="-160" width="360" height="34" rx="22" fill="#0e1119"/>
    <circle cx="-160" cy="-143" r="6" fill="#ff5f56"/>
    <circle cx="-140" cy="-143" r="6" fill="#ffbd2e"/>
    <circle cx="-120" cy="-143" r="6" fill="#27c93f"/>
    <rect x="-160" y="-80" width="320" height="3" fill="url(#accent)"/>
    <text x="0" y="-100" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#eef0f7">Clean My Video</text>
    <rect x="-150" y="-55" width="300" height="110" rx="12" fill="#0e1119" stroke="#3a4159" stroke-dasharray="4 4"/>
    <text x="0" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="44" fill="#a78bfa">&#8595;</text>
    <text x="0" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#eef0f7">Drop a file here</text>
    <rect x="-150" y="80" width="300" height="40" rx="10" fill="url(#accent)"/>
    <text x="0" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="white">Censor</text>
  </g>
</svg>
